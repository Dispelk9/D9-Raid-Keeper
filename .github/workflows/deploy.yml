name: CI

on:
  push:
    branches: [main]
    paths:
      - 'd9r-game/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  test:
    name: Type-check & lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: d9r-game

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: d9r-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint
